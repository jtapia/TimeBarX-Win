<?xml version="1.0" encoding="UTF-8"?>
<!--
  TimeBarX icon (Windows).
  This SVG is a thin wrapper around icon-master.png (the real raster artwork).
  The build pipeline regenerates icon.ico from this SVG; keeping it as a
  raster-embedding SVG lets the existing pipeline keep working while ensuring
  the rendered .ico matches the macOS/iOS/watchOS squircle icon.
  To update the icon: replace icon-master.png — this SVG embeds it relatively.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024"
     xmlns:xlink="http://www.w3.org/1999/xlink">
  <image href="icon-master.png" x="0" y="0" width="1024" height="1024"/>
</svg>
